<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finanzas Personales</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Finanzas Personales</h1>
    <p id="current-date"></p>
  </header>

  <main>
    <!-- Summary Cards -->
    <section class="summary">
      <div class="card balance">
        <span class="card-label">Balance Total</span>
        <span class="card-amount" id="total-balance">$0.00</span>
      </div>
      <div class="card income">
        <span class="card-label">Ingresos del Mes</span>
        <span class="card-amount" id="total-income">$0.00</span>
      </div>
      <div class="card expense">
        <span class="card-label">Gastos del Mes</span>
        <span class="card-amount" id="total-expense">$0.00</span>
      </div>
      <div class="card savings">
        <span class="card-label">Ahorro del Mes</span>
        <span class="card-amount" id="total-savings">$0.00</span>
      </div>
    </section>

    <div class="content-grid">
      <!-- Add Transaction Form -->
      <section class="form-section">
        <h2>Nueva Transacción</h2>
        <form id="transaction-form">
          <div class="form-group">
            <label for="transaction-type">Tipo</label>
            <div class="type-toggle">
              <button type="button" class="toggle-btn active" data-type="expense">Gasto</button>
              <button type="button" class="toggle-btn" data-type="income">Ingreso</button>
            </div>
            <input type="hidden" id="transaction-type" value="expense" />
          </div>
          <div class="form-group">
            <label for="description">Descripción</label>
            <input type="text" id="description" placeholder="Ej: Supermercado" required />
          </div>
          <div class="form-group">
            <label for="amount">Monto ($)</label>
            <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" required />
          </div>
          <div class="form-group">
            <label for="category">Categoría</label>
            <select id="category" required>
              <option value="">Seleccionar...</option>
            </select>
          </div>
          <div class="form-group">
            <label for="date">Fecha</label>
            <input type="date" id="date" required />
          </div>
          <button type="submit" class="btn-add">Agregar Transacción</button>
        </form>
      </section>

      <!-- Charts -->
      <section class="charts-section">
        <h2>Resumen Visual</h2>
        <div class="chart-tabs">
          <button class="chart-tab active" data-chart="expense-chart">Gastos</button>
          <button class="chart-tab" data-chart="monthly-chart">Mensual</button>
        </div>
        <div id="expense-chart" class="chart-container active">
          <canvas id="expenseCanvas"></canvas>
          <p class="no-data" id="no-expense-data">Sin datos de gastos</p>
        </div>
        <div id="monthly-chart" class="chart-container">
          <canvas id="monthlyCanvas"></canvas>
          <p class="no-data" id="no-monthly-data">Sin datos mensuales</p>
        </div>
      </section>
    </div>

    <!-- Transactions List -->
    <section class="transactions-section">
      <div class="transactions-header">
        <h2>Historial de Transacciones</h2>
        <div class="filters">
          <select id="filter-type">
            <option value="all">Todos</option>
            <option value="income">Ingresos</option>
            <option value="expense">Gastos</option>
          </select>
          <select id="filter-category">
            <option value="all">Todas las categorías</option>
          </select>
          <select id="filter-month">
            <option value="all">Todos los meses</option>
          </select>
          <button id="clear-filters" class="btn-secondary">Limpiar filtros</button>
        </div>
      </div>
      <div id="transactions-list">
        <p class="empty-message">No hay transacciones. ¡Agrega tu primera!</p>
      </div>
    </section>
  </main>

  <!-- Delete Confirmation Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <p>¿Eliminar esta transacción?</p>
      <div class="modal-actions">
        <button id="confirm-delete" class="btn-danger">Eliminar</button>
        <button id="cancel-delete" class="btn-secondary">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
